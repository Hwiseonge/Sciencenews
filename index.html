<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science News Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🚀 실시간 과학 뉴스</h1>
            <div id="status" class="text-xs bg-indigo-800 px-2 py-1 rounded">연결 중...</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-slate-400">뉴스를 불러오는 중입니다...</div>
        </div>
    </main>

    <script>
        // 구글 뉴스 RSS 피드를 JSON으로 바꿔주는 무료 주소
        const RSS_URL = 'https://news.google.com/rss/search?q=%EA%B3%BC%ED%95%99&hl=ko&gl=KR&ceid=KR%3Ako';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

        async function loadNews() {
            const grid = document.getElementById('news-grid');
            const status = document.getElementById('status');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.status === 'ok') {
                    grid.innerHTML = '';
                    status.innerText = '실시간 연결됨';
                    status.classList.replace('bg-indigo-800', 'bg-green-500');

                    data.items.forEach(item => {
                        // 썸네일 이미지가 있으면 쓰고 없으면 과학 기본 이미지
                        const thumbnail = item.enclosure.link || 'https://images.unsplash.com/photo-1507413245164-6160d8298b31?auto=format&fit=crop&w=500';
                        const pubDate = new Date(item.pubDate).toLocaleDateString();

                        const card = `
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                                <div class="p-5">
                                    <div class="text-xs text-indigo-600 font-bold mb-2">LATEST NEWS</div>
                                    <h3 class="text-lg font-bold mb-3 leading-tight text-slate-800">${item.title}</h3>
                                    <div class="flex justify-between items-center mt-4">
                                        <span class="text-xs text-slate-400">${pubDate}</span>
                                        <a href="${item.link}" target="_blank" class="text-sm font-bold text-indigo-600">원문 읽기 →</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            } catch (error) {
                grid.innerHTML = '<p class="text-center col-span-full">뉴스를 가져오는데 실패했습니다.</p>';
            }
        }

        window.onload = loadNews;
    </script>
</body>
</html>
