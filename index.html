<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11반 전용 과학 뉴스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .tab-active { background-color: #4f46e5 !important; color: white !important; shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39); }
        .news-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <header class="bg-white/70 backdrop-blur-xl sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tight cursor-pointer" onclick="location.reload()">
                <span class="text-indigo-600">11반</span>전용과학뉴스
            </h1>
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Now</span>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b border-slate-100 sticky top-16 z-40 overflow-x-auto">
        <div class="container mx-auto px-5 py-3 flex gap-3">
            <button onclick="loadGoogleNews('과학', this)" class="category-btn tab-active px-5 py-2 text-sm font-bold bg-slate-100 text-slate-600 rounded-full transition-all">전체</button>
            <button onclick="loadGoogleNews('우주 항공 천문학', this)" class="category-btn px-5 py-2 text-sm font-bold bg-slate-100 text-slate-600 rounded-full transition-all">우주/천문</button>
            <button onclick="loadGoogleNews('IT 인공지능 로봇', this)" class="category-btn px-5 py-2 text-sm font-bold bg-slate-100 text-slate-600 rounded-full transition-all">IT/AI</button>
            <button onclick="loadGoogleNews('생명과학 유전공학 의학', this)" class="category-btn px-5 py-2 text-sm font-bold bg-slate-100 text-slate-600 rounded-full transition-all">바이오/의학</button>
            <button onclick="loadGoogleNews('기후변화 신재생에너지 환경', this)" class="category-btn px-5 py-2 text-sm font-bold bg-slate-100 text-slate-600 rounded-full transition-all">환경/에너지</button>
        </div>
    </nav>

    <main class="container mx-auto px-5 py-8">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <div class="col-span-full text-center py-20">
                <p class="text-slate-400 animate-pulse">구글에서 실시간 소식을 가져오고 있습니다...</p>
            </div>
        </div>
    </main>

    <script>
        // RSS를 JSON으로 변환해주는 프록시 서버 주소
        const RSS_CONVERTER = "https://api.rss2json.com/v1/api.json?rss_url=";

        async function loadGoogleNews(query, btn) {
            const container = document.getElementById('news-container');
            
            // 버튼 디자인 변경
            if(btn) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('tab-active'));
                btn.classList.add('tab-active');
            }

            container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">새로운 소식을 연결 중입니다...</div>';

            // 구글 뉴스 RSS 주소 조합 (한국어 설정)
            const googleRssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ko&gl=KR&ceid=KR%3Ako`;
            
            try {
                const response = await fetch(RSS_CONVERTER + encodeURIComponent(googleRssUrl));
                const data = await response.json();

                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.forEach(item => {
                        // 제목에서 언론사 분리 (보통 제목 마지막에 ' - 언론사명' 형식)
                        const titleParts = item.title.split(' - ');
                        const pureTitle = titleParts[0];
                        const publisher = titleParts[1] || '과학 뉴스';
                        const date = new Date(item.pubDate).toLocaleDateString('ko-KR');

                        const card = `
                            <div class="news-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between h-full">
                                <div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md uppercase">${publisher}</span>
                                        <span class="text-[10px] text-slate-400 font-medium">${date}</span>
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-900 leading-snug mb-4 break-keep">${pureTitle}</h3>
                                </div>
                                <a href="${item.link}" target="_blank" class="inline-flex items-center justify-center w-full bg-slate-900 text-white text-sm font-bold py-3 rounded-2xl hover:bg-indigo-600 transition-colors">
                                    기사 본문 읽기
                                </a>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                }
            } catch (error) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-red-500">뉴스를 불러오지 못했습니다. 다시 시도해주세요.</div>';
            }
        }

        // 처음 페이지 접속 시 '과학' 키워드로 로딩
        window.onload = () => loadGoogleNews('과학');
    </script>
</body>
</html>
