<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Live - 실시간 과학 소식</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight cursor-pointer" onclick="loadNews('science')">🔭 SCIENCE LIVE</h1>
            <div class="space-x-2 md:space-x-4 flex overflow-x-auto">
                <button onclick="loadNews('science')" class="px-4 py-2 rounded-full bg-indigo-100 text-indigo-700 font-bold hover:bg-indigo-600 hover:text-white transition">전체</button>
                <button onclick="loadNews('technology')" class="px-4 py-2 rounded-full bg-gray-200 hover:bg-indigo-600 hover:text-white transition">IT/기술</button>
                <button onclick="loadNews('health')" class="px-4 py-2 rounded-full bg-gray-200 hover:bg-indigo-600 hover:text-white transition">생명/의학</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <div class="mb-10 text-center">
            <h2 id="category-title" class="text-3xl font-bold mb-2">최신 과학 뉴스</h2>
            <p class="text-gray-500">실시간으로 업데이트되는 과학계 소식을 확인하세요.</p>
        </div>

        <div id="loader" class="flex justify-center my-20 hidden">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="border-t border-gray-200 py-10 text-center text-gray-500 text-sm">
        <p>© 2026 Science Live. Data provided by NewsAPI.</p>
    </footer>

    <script>
        // ⚠️ 주의: 여기에 본인의 API Key를 입력해야 작동합니다!
        const API_KEY = 'YOUR_API_KEY_HERE'; 

        async function loadNews(category) {
            const container = document.getElementById('news-container');
            const loader = document.getElementById('loader');
            const title = document.getElementById('category-title');

            // UI 초기화
            container.innerHTML = '';
            loader.classList.remove('hidden');
            title.innerText = `${category.toUpperCase()} 뉴스`;

            try {
                // 한국(kr) 뉴스 중 해당 카테고리만 가져오기
                const response = await fetch(`https://newsapi.org/v2/top-headlines?country=kr&category=${category}&apiKey=${API_KEY}`);
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.articles && data.articles.length > 0) {
                    data.articles.forEach(article => {
                        // 뉴스가 이미지가 없는 경우 기본 이미지 사용
                        const imageUrl = article.urlToImage || 'https://via.placeholder.com/400x250?text=No+Image';
                        
                        const card = `
                            <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden flex flex-col">
                                <img src="${imageUrl}" alt="news" class="w-full h-48 object-cover">
                                <div class="p-6 flex flex-col flex-grow">
                                    <h3 class="text-xl font-bold mb-3 line-clamp-2">${article.title}</h3>
                                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">${article.description || '내용 요약이 없습니다.'}</p>
                                    <div class="mt-auto">
                                        <a href="${article.url}" target="_blank" class="inline-block w-full text-center bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">기사 읽기</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                } else {
                    container.innerHTML = '<p class="text-center col-span-full py-20 text-gray-400">가져올 뉴스가 없습니다. API 키를 확인해주세요!</p>';
                }
            } catch (error) {
                console.error("Error fetching news:", error);
                loader.classList.add('hidden');
                container.innerHTML = '<p class="text-center col-span-full py-20 text-red-400">데이터를 불러오는 중 오류가 발생했습니다.</p>';
            }
        }

        // 페이지 처음 들어왔을 때 실행
        loadNews('science');
    </script>
</body>
</html>
