<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11반 전용 과학 뉴스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .tab-active { background-color: #4f46e5; color: white; border-radius: 9999px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="container mx-auto px-5 h-16 flex items-center justify-between">
            <h1 class="text-xl font-black text-indigo-600 tracking-tighter transition hover:scale-105 cursor-pointer" onclick="location.reload()">
                11반<span class="text-slate-800">전용과학뉴스</span>
            </h1>
            <div id="status" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-100 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <div class="container mx-auto px-5 py-3 flex gap-2">
            <button onclick="changeCategory('과학', this)" class="category-btn px-5 py-2 text-sm font-bold tab-active">전체</button>
            <button onclick="changeCategory('우주 천문학', this)" class="category-btn px-5 py-2 text-sm font-semibold text-slate-500 hover:text-indigo-600">우주/천문</button>
            <button onclick="changeCategory('IT 기술 AI', this)" class="category-btn px-5 py-2 text-sm font-semibold text-slate-500 hover:text-indigo-600">IT/AI</button>
            <button onclick="changeCategory('바이오 생명공학', this)" class="category-btn px-5 py-2 text-sm font-semibold text-slate-500 hover:text-indigo-600">바이오/생명</button>
            <button onclick="changeCategory('환경 기후에너지', this)" class="category-btn px-5 py-2 text-sm font-semibold text-slate-500 hover:text-indigo-600">환경/에너지</button>
        </div>
    </div>

    <main class="container mx-auto px-5 py-8">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-slate-400 animate-bounce">뉴스를 동기화 중입니다...</div>
        </div>
    </main>

    <footer class="text-center py-10 text-slate-400 text-xs border-t border-slate-100 mt-10">
        <p class="font-bold mb-1">우리 반을 위한 실시간 과학 큐레이션</p>
        <p>© 2024 11반 전용 서비스</p>
    </footer>

    <script>
        // 뉴스 데이터를 불러오는 핵심 함수 (분야별 검색어 적용)
        async function fetchNews(keyword) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">데이터를 실시간으로 연결 중...</div>';

            const RSS_URL = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ko&gl=KR&ceid=KR%3Ako`;
            // rss2json 서비스를 이용해 RSS를 JSON으로 변환
            const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.status === 'ok') {
                    grid.innerHTML = '';
                    data.items.slice(0, 15).forEach(item => {
                        const card = createNewsCard(item);
                        grid.innerHTML += card;
                    });
                }
            } catch (error) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400 font-bold">네트워크 연결을 확인해주세요!</div>';
            }
        }
