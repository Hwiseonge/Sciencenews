<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Feed - 실시간 과학 소식</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        /* 로딩 애니메이션 */
        .spinner { border: 3px solid rgba(0,0,0,.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-extrabold text-indigo-600 tracking-tighter cursor-pointer" onclick="location.reload()">
                SCIENCE<span class="text-slate-800">FEED</span>
            </h1>
            <nav class="flex gap-2">
                <button onclick="fetchNews('science')" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold bg-indigo-600 text-white">전체</button>
                <button onclick="fetchNews('technology')" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-600">IT/기술</button>
                <button onclick="fetchNews('health')" class="category-btn px-4 py-1.5 rounded-full text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-600">생명/의학</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-8">
            <h2 id="current-category" class="text-2xl font-bold text-slate-800">최신 과학 소식</h2>
            <p class="text-slate-500 text-sm">NewsAPI를 통해 실시간으로 제공되는 정보입니다.</p>
        </div>

        <div id="loader" class="flex justify-center py-20 hidden">
            <div class="spinner"></div>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="text-center py-10 text-slate-400 text-xs">
        <p>© 2026 Science Feed Project · Powered by NewsAPI</p>
    </footer>

    <script>
        // 사용자가 제공한 API Key (보안상 서버에서 관리하는게 좋지만, 연습용으로는 괜찮습니다!)
        const API_KEY = '5137f252f9f747c49103fd44a53ed385';

        async function fetchNews(category) {
            const grid = document.getElementById('news-grid');
            const loader = document.getElementById('loader');
            const catTitle = document.getElementById('current-category');

            // 초기화 및 로딩 시작
            grid.innerHTML = '';
            loader.classList.remove('hidden');
            
            // 버튼 스타일 업데이트
            updateButtonStyles(category);

            try {
                // 한국어 뉴스 요청 (category 파라미터 활용)
                const url = `https://newsapi.org/v2/top-headlines?country=kr&category=${category}&apiKey=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.status === 'ok' && data.articles.length > 0) {
                    data.articles.forEach(article => {
                        const card = createCard(article);
                        grid.innerHTML += card;
                    });
                } else {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">뉴스를 불러올 수 없습니다. API 할당량을 확인하세요.</div>`;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                loader.classList.add('hidden');
            }
        }

        function createCard(article) {
            const img = article.urlToImage || 'https://images.unsplash.com/photo-1518152006812-edab29b069ac?q=80&w=800&auto=format&fit=crop';
            const desc = article.description || '본문 요약 내용이 없습니다. 자세한 내용은 원문을 참조하세요.';
            const date = new Date(article.publishedAt).toLocaleDateString('ko-KR');

            return `
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300">
                    <img src="${img}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x250?text=Science'">
                    <div class="p-5">
                        <p class="text-[10px] font-bold text-indigo-500 mb-1 uppercase tracking-widest">${article.source.name}</p>
                        <h3 class="text-lg font-bold text-slate-800 mb-2 line-clamp-2">${article.title}</h3>
                        <p class="text-sm text-slate-500 mb-4 line-clamp-3">${desc}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-slate-400">${date}</span>
                            <a href="${article.url}" target="_blank" class="text-sm font-bold text-indigo-600 hover:text-indigo-800">읽어보기 →</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateButtonStyles(activeCategory) {
            const btns = document.querySelectorAll('.category-btn');
            btns.forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            // 클릭한 버튼 스타일 활성화 (간단 구현)
            event.target.classList.add('bg-indigo-600', 'text-white');
            event.target.classList.remove('bg-slate-100', 'text-slate-600');
        }

        // 초기 실행
        window.onload = () => fetchNews('science');
    </script>
</body>
</html>
